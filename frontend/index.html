<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纸牌对战 · 大厅</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="producer-badge">Producer: vincent</div>

  <div class="lobby-container">
    <!-- 标题 -->
    <header class="lobby-header">
      <div class="lang-switch">
        <label for="lang-select" id="lang-label">语言</label>
        <select id="lang-select">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <h1 id="lobby-title">🃏 纸牌对战</h1>
      <p class="subtitle" id="lobby-subtitle">多人在线实时对战</p>
      <p style="margin-top:10px;">
        <a id="btn-rules" href="rules.html" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-sm">查看规则</a>
      </p>
    </header>

    <!-- 玩家名称 -->
    <section class="card-panel" id="name-panel">
      <h2 id="label-your-name">你的名称</h2>
      <div class="input-row">
        <input type="text" id="player-name" placeholder="输入玩家名称…" maxlength="12" />
      </div>
    </section>

    <!-- 操作区 -->
    <section class="card-panel actions-panel">
      <!-- 创建房间 -->
      <div class="action-block">
        <h2 id="label-create-room">创建房间</h2>
        <input type="text" id="room-name" placeholder="房间名称（选填）" maxlength="20" />
        <div class="input-row">
          <input type="number" id="max-players" placeholder="人数上限" min="2" max="8" value="4" />
          <input type="password" id="create-password" placeholder="密码（选填）" maxlength="16" />
        </div>
        <div class="input-row">
          <label style="display:flex;align-items:center;gap:6px;font-size:0.86rem;color:var(--text-dim)">
            <input type="checkbox" id="continue-mode" checked />
            <span id="label-continue-mode">继续游戏模式</span>
          </label>
        </div>
        <div class="input-row">
          <input type="number" id="success-target" placeholder="成功次数结束" min="1" max="10" value="2" />
          <input type="number" id="fail-target" placeholder="失败次数结束" min="1" max="10" value="2" />
        </div>
        <button id="btn-create" class="btn btn-primary">创建并进入</button>
      </div>

      <div class="divider" id="label-or">或</div>

      <!-- 加入房间 -->
      <div class="action-block">
        <h2 id="label-join-room">加入房间</h2>
        <div class="input-row">
          <input type="text" id="room-id" placeholder="房间 ID（6 位）" maxlength="6" style="text-transform:uppercase" />
          <input type="password" id="join-password" placeholder="密码（如有）" maxlength="16" />
        </div>
        <button id="btn-join" class="btn btn-secondary">加入</button>
      </div>
    </section>

    <!-- 公开房间列表 -->
    <section class="card-panel">
      <div class="panel-header">
        <h2 id="label-public-rooms">公开房间</h2>
        <button id="btn-refresh" class="btn btn-ghost btn-sm">🔄 刷新</button>
      </div>
      <ul id="room-list" class="room-list">
        <li class="empty-hint">暂无公开房间</li>
      </ul>
    </section>

    <!-- 状态栏 -->
    <div id="status-bar" class="status-bar hidden"></div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
